name: "🌸 Pollen Forecast Bot"

on:
  schedule:
    # 朝6:30 JST (21:30 UTC 前日) - メイン予報
    - cron: "30 21 * * *"
    # 昼12:00 JST (03:00 UTC) - 豆知識・比較系
    - cron: "0 3 * * *"
    # 夜19:00 JST (10:00 UTC) - 一言・ルーティン系
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "テスト実行（投稿しない）"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      tweet_format:
        description: "投稿フォーマット (standard/oneline/comparison/weekend/mythbust/routine)"
        required: false
        default: ""

jobs:
  post-pollen-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: "📥 リポジトリをチェックアウト"
        uses: actions/checkout@v4

      - name: "🐍 Python セットアップ"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 依存パッケージをインストール"
        run: |
          pip install -r requirements.txt

      - name: "📂 前日データを復元"
        uses: actions/cache@v4
        with:
          path: src/pollen_history.json
          key: pollen-history-${{ github.run_id }}
          restore-keys: |
            pollen-history-

      - name: "⏰ 投稿スロットとフォーマットを決定"
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TWEET_SLOT=manual" >> $GITHUB_ENV
            echo "TWEET_FORMAT=${{ github.event.inputs.tweet_format }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 21 * * *" ]; then
            echo "TWEET_SLOT=morning" >> $GITHUB_ENV
            echo "TWEET_FORMAT=standard" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 3 * * *" ]; then
            echo "TWEET_SLOT=noon" >> $GITHUB_ENV
            echo "TWEET_FORMAT=mythbust" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 10 * * *" ]; then
            echo "TWEET_SLOT=evening" >> $GITHUB_ENV
            echo "TWEET_FORMAT=routine" >> $GITHUB_ENV
          else
            echo "TWEET_SLOT=default" >> $GITHUB_ENV
            echo "TWEET_FORMAT=" >> $GITHUB_ENV
          fi

      - name: "🌸 花粉予報Bot 実行"
        working-directory: src
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          GOOGLE_POLLEN_API_KEY: ${{ secrets.GOOGLE_POLLEN_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          POLLEN_HISTORY_FILE: pollen_history.json
          TWEET_FORMAT: ${{ env.TWEET_FORMAT }}
          TWEET_SLOT: ${{ env.TWEET_SLOT }}
        run: |
          python main.py
